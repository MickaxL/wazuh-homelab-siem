[defaults]
inventory = inventory.ini         # pas besoin de faire -i inventory.ini à chaque fois
host_key_checking = False         # évite le message SSH “Are you sure you want to continue”
stdout_callback = yaml            # sortie plus lisible
interpreter_python = auto_silent

[privilege_escalation]
become = True                     # sudo automatique
become_method = sudo
become_ask_pass = False

# ansible all -i inventory.ini -m ping   -> ansible all -m ping